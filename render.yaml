services:
  - type: web
    name: investgraph-ai
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATA_STORAGE
        value: local-json
      - key: DATA_DIR
        value: /var/data
      - key: APP_USERNAME
        value: investgraph
      - key: APP_PASSWORD
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_MODEL
        sync: false
    disk:
      name: investgraph-data
      mountPath: /var/data
      sizeGB: 1
